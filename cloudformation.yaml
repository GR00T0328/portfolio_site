AWSTemplateFormatVersion: '2010-09-09'
Description: 'Portfolio Website on EC2 with Docker'

Parameters:
  KeyName:
    Description: Name of an existing EC2 KeyPair for SSH access
    Type: String
    Default: vockey
    ConstraintDescription: Must be the name of an existing key pair.

Resources:
  # Security Group - allows web traffic
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP and SSH access for portfolio website
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP from anywhere
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: Allow SSH from anywhere

  # EC2 Instance with Docker
  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c55b159cbfafe1f0
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y docker
          service docker start
          usermod -a -G docker ec2-user
          chkconfig docker on
          docker pull gr00t0328/portfolio-site:latest
          docker run -d -p 80:80 --restart always gr00t0328/portfolio-site:latest

Outputs:
  WebsiteURL:
    Description: URL of the portfolio website
    Value: !Sub http://${WebServerInstance.PublicDnsName}
  PublicIP:
    Description: Public IP address of the EC2 instance
    Value: !GetAtt WebServerInstance.PublicIp